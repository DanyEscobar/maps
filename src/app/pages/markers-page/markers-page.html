
<div
  #map
  class="h-[60vh] md:h-[calc(100vh-64px)]"
>
</div>

<section
  class="h-[40vh] sm:fixed sm:w-[260px] sm:top-40 sm:left-3 z-9999999 bg-white p-2 sm:rounded p-5 overflow-y-scroll"
  (click)="stopEvent($event)"
  (keydown)="stopEvent($event)"
  (dblclick)="stopEvent($event)"
  aria-label="Marcadores"
>
  <h2 class="text-xl font-bold mb-2 text-black">Marcadores</h2>
  <div class="flex flex-col gap-2">
    @for (marker of markers(); track marker.id) {
      <div 
        class="flex justify-between items-center"
        (click)="flyToMarker(marker.leafletMarker.getLatLng())"
        (keydown)="flyToMarker(marker.leafletMarker.getLatLng())"
        (dblclick)="deleteMarker(marker)"
      >
        <label 
          [for]="marker.id"
          class="text-black label-text mr-2 text-xs"
        >
          {{ marker.leafletMarker.getLatLng() | json }}
        </label>
        <input
          type="radio" 
          name="radio-12" 
          [checked]="marker.id === markers()[0].id"
          [id]="marker.id"
          [style]="{ backgroundColor: marker.color, color: marker.color }"
          class="radio checked:bg-black!"
        />
      </div>
    }
    @empty {
      <div class="flex justify-center items-center bg-blue-100 rounded p-3">
        <p class="text-xs text-secondary text-black">No hay marcadores</p>
      </div>
    }
  </div>

</section>
