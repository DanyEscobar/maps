 <div #map class="h-[calc(100vh-64px)] z-1 w-full"></div>


<section 
  id="controls"
  class="bg-white p-[10px] rounded-[5px] fixed bottom-[25px] z-[9999] right-[20px] shadow-[0_0_10px_0_rgba(0,0,0,0.1)] border-[1px_solid_#e2e8f0] w-[250px]"
>
  <h2
    class="text-2xl font-bold text-black mb-2"
  >
    Zoom
    <small
      class="text-gray-500 font-normal"
    >
      {{ zoom() }}
    </small>
  </h2>

  <input 
    type="range" 
    min="1" 
    max="19" 
    [value]="zoom()"
    class="range range-secondary"
    (input)="zoom.set(+zoomRange.value)"
    #zoomRange
  />

  <h2
    class="text-2xl font-bold text-black mb-2 mt-4"
  >
    Coordenadas
  </h2>
  <pre
    class="text-sm text-gray-500 font-normal"
    >{{
      {
        latitude: coordinates().lat | number: '1.4-4',
        longitude: coordinates().lng | number: '1.4-4'
      } | json
    }}
  </pre>
</section>
